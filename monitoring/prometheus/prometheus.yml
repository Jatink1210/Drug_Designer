# Drug Designer — Production Prometheus Configuration
# Task 23.1: Monitoring & Observability (NFR-MAIN-002)
#
# Scrapes metrics from:
# - FastAPI application (API servers)
# - PostgreSQL database
# - Redis cache
# - Qdrant vector store
# - Neo4j graph database
# - MinIO object storage
# - Nginx reverse proxy

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'drug-designer-prod'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load alerting rules
rule_files:
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:
  # ═══════════════════════════════════════════════════════════
  # Application Metrics
  # ═══════════════════════════════════════════════════════════

  - job_name: 'drug-designer-api'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'api'
          layer: 'application'
          component: 'fastapi'

  # ═══════════════════════════════════════════════════════════
  # Database Metrics
  # ═══════════════════════════════════════════════════════════

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'postgres'
          layer: 'data'
          component: 'database'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'
          layer: 'data'
          component: 'cache'

  - job_name: 'qdrant'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['qdrant:6333']
        labels:
          service: 'qdrant'
          layer: 'data'
          component: 'vector-store'

  - job_name: 'neo4j'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['neo4j:7474']
        labels:
          service: 'neo4j'
          layer: 'data'
          component: 'graph-database'

  # ═══════════════════════════════════════════════════════════
  # Storage Metrics
  # ═══════════════════════════════════════════════════════════

  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    scheme: http
    static_configs:
      - targets: ['minio:9000']
        labels:
          service: 'minio'
          layer: 'data'
          component: 'object-storage'

  # ═══════════════════════════════════════════════════════════
  # Infrastructure Metrics
  # ═══════════════════════════════════════════════════════════

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
        labels:
          service: 'nginx'
          layer: 'infrastructure'
          component: 'reverse-proxy'

  # ═══════════════════════════════════════════════════════════
  # Observability Stack Metrics
  # ═══════════════════════════════════════════════════════════

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          layer: 'observability'
          component: 'metrics'

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'
          layer: 'observability'
          component: 'dashboards'

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'
          layer: 'observability'
          component: 'logs'
