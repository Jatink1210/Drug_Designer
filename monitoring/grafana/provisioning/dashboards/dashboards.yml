# Drug Designer — Grafana Dashboards Configuration
# Task 23.1: Automatic dashboard provisioning

apiVersion: 1

providers:
  - name: 'Drug Designer Dashboards'
    orgId: 1
    folder: 'Drug Designer'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
