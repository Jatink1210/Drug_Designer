name: Drug Designer CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run backend tests
        run: python -m pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/web/dist/

  connector-smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install httpx structlog
      - name: Smoke test connectors
        run: |
          python -c "
          import asyncio, httpx
          async def test():
              async with httpx.AsyncClient(timeout=10) as c:
                  r = await c.get('https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi', params={'db':'pubmed','term':'EGFR','retmax':1,'retmode':'json'})
                  assert r.status_code == 200, 'PubMed failed'
                  r = await c.get('https://rest.uniprot.org/uniprotkb/search', params={'query':'EGFR','size':1,'format':'json'})
                  assert r.status_code == 200, 'UniProt failed'
                  r = await c.get('https://data.rcsb.org/rest/v1/core/entry/1EGF')
                  assert r.status_code == 200, 'RCSB failed'
                  print('All connector smoke tests passed!')
          asyncio.run(test())
          "
