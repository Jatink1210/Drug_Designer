name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  compose-config:
    name: Compose Config Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker compose manifests
        run: |
          docker compose -f docker-compose.yml config --services
          docker compose -f docker-compose.prod.yml config --services

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: drugdesigner
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: drugdesigner_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      neo4j:
        image: neo4j:5.14
        env:
          NEO4J_AUTH: neo4j/test_password
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p test_password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      qdrant:
        image: qdrant/qdrant:v1.7.0
        ports:
          - 6333:6333
      
      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd apps/api
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://drugdesigner:test_password@localhost:5432/drugdesigner_test
        run: |
          cd apps/api
          alembic upgrade head
      
      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://drugdesigner:test_password@localhost:5432/drugdesigner_test
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test_password
          QDRANT_URL: http://localhost:6333
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key_for_ci
        run: |
          cd apps/api
          pytest tests/unit/ -v --cov=. --cov-report=xml --cov-report=term
      
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://drugdesigner:test_password@localhost:5432/drugdesigner_test
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test_password
          QDRANT_URL: http://localhost:6333
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key_for_ci
        run: |
          cd apps/api
          pytest tests/integration/ -v
      
      - name: Run failure drills
        env:
          DATABASE_URL: postgresql://drugdesigner:test_password@localhost:5432/drugdesigner_test
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test_password
          QDRANT_URL: http://localhost:6333
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key_for_ci
        run: |
          cd apps/api
          pytest tests/failure_drills/ -v
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./apps/api/coverage.xml
          flags: backend
          name: backend-coverage
  
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      
      - name: Install dependencies
        run: |
          cd apps/web
          npm ci
      
      - name: Run ESLint
        run: |
          cd apps/web
          npm run lint
      
      - name: Run TypeScript compiler check
        run: |
          cd apps/web
          npx tsc --noEmit
      
      - name: Run unit tests
        run: |
          cd apps/web
          npm test -- --coverage --watchAll=false
      
      - name: Build frontend
        run: |
          cd apps/web
          npm run build
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./apps/web/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
  
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: drugdesigner
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: drugdesigner_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      neo4j:
        image: neo4j:5.14
        env:
          NEO4J_AUTH: neo4j/test_password
        ports:
          - 7687:7687
      
      qdrant:
        image: qdrant/qdrant:v1.7.0
        ports:
          - 6333:6333
      
      redis:
        image: redis:7.2
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install backend dependencies
        run: |
          cd apps/api
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://drugdesigner:test_password@localhost:5432/drugdesigner_test
        run: |
          cd apps/api
          alembic upgrade head
      
      - name: Start backend server
        env:
          DATABASE_URL: postgresql://drugdesigner:test_password@localhost:5432/drugdesigner_test
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test_password
          QDRANT_URL: http://localhost:6333
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key_for_ci
        run: |
          cd apps/api
          python run_server.py &
          sleep 10
      
      - name: Install frontend dependencies
        run: |
          cd apps/web
          npm ci
      
      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: apps/web
          start: npm run dev
          wait-on: 'http://localhost:5173, http://localhost:8000/api/v1/health'
          wait-on-timeout: 120
          browser: chrome
          record: false
      
      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: cypress-screenshots
          path: apps/web/cypress/screenshots
      
      - name: Upload Cypress videos
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: cypress-videos
          path: apps/web/cypress/videos
  
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python linters
        run: |
          pip install black ruff bandit
      
      - name: Run Black (Python formatter check)
        run: |
          cd apps/api
          black --check .
      
      - name: Run Ruff (Python linter)
        run: |
          cd apps/api
          ruff check .
      
      - name: Run Bandit (Python security linter)
        run: |
          cd apps/api
          bandit -r . -ll -x tests/,alembic/
