name: DrugSynth Workbench CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r ../../FINAL_SHIP/requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run backend tests
        run: python -m pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/web/dist/

  connector-smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install httpx structlog
      - name: Smoke test connectors
        run: |
          python -c "
          import asyncio, httpx
          async def test():
              async with httpx.AsyncClient(timeout=10) as c:
                  # PubMed
                  r = await c.get('https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi', params={'db':'pubmed','term':'EGFR','retmax':1,'retmode':'json'})
                  assert r.status_code == 200, 'PubMed failed'
                  # UniProt
                  r = await c.get('https://rest.uniprot.org/uniprotkb/search', params={'query':'EGFR','size':1,'format':'json'})
                  assert r.status_code == 200, 'UniProt failed'
                  # RCSB
                  r = await c.get('https://data.rcsb.org/rest/v1/core/entry/1EGF')
                  assert r.status_code == 200, 'RCSB failed'
                  print('All connector smoke tests passed!')
          asyncio.run(test())
          "

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install backend dependencies
        working-directory: apps/api
        run: |
          pip install -r requirements.txt
          
      - name: Start backend server
        working-directory: apps/api
        env:
          DRUGDESIGNER_AUTH_ENABLED: "true"
          JWT_SECRET: "ci_test_secret_key"
        run: |
          python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci
        
      - name: Start frontend server
        working-directory: apps/web
        env:
          VITE_AUTH_ENABLED: "true"
        run: |
          npm run dev &
          sleep 5
          
      - name: Run Cypress E2E Tests
        working-directory: apps/web
        env:
          VITE_AUTH_ENABLED: "true"
        run: npx cypress run

  generate-sbom:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Generate Python SBOM
        run: |
          pip install pip-licenses
          pip install -r FINAL_SHIP/requirements.txt 2>/dev/null || true
          pip-licenses --format=json --output-file=FINAL_SHIP/sbom_python.json 2>/dev/null || echo '[]' > FINAL_SHIP/sbom_python.json
      - name: Generate checksums
        run: |
          find FINAL_SHIP/ -type f -exec sha256sum {} \; > FINAL_SHIP/checksums.sha256
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-checksums
          path: FINAL_SHIP/
