name: Continuous Deployment

# Task 24.1: GitHub Actions CD Workflow
# Automated deployment to staging and production environments

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip tests (emergency deployment only)'
        required: false
        type: boolean
        default: false

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════
  # Determine Deployment Environment
  # ═══════════════════════════════════════════════════════════
  
  determine-environment:
    name: Determine Deployment Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      should_deploy: ${{ steps.set-env.outputs.should_deploy }}
    
    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=none" >> $GITHUB_OUTPUT
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  # ═══════════════════════════════════════════════════════════
  # Build and Push Docker Images
  # ═══════════════════════════════════════════════════════════
  
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: determine-environment
    if: needs.determine-environment.outputs.should_deploy == 'true'
    
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [api, web]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=${{ needs.determine-environment.outputs.environment }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      
      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

  # ═══════════════════════════════════════════════════════════
  # Deploy to Staging
  # ═══════════════════════════════════════════════════════════
  
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [determine-environment, build-and-push]
    if: needs.determine-environment.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.drugdesigner.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to staging server
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            cd /opt/drugdesigner
            
            # Pull latest images
            docker-compose -f docker-compose.staging.yml pull
            
            # Run database migrations
            docker-compose -f docker-compose.staging.yml run --rm api alembic upgrade head
            
            # Deploy with zero downtime
            docker-compose -f docker-compose.staging.yml up -d --no-deps --build api web
            
            # Wait for health checks
            sleep 30
            
            # Verify deployment
            curl -f http://localhost:8000/api/health || exit 1
            
            # Clean up old images
            docker image prune -f
          EOF
      
      - name: Run smoke tests
        run: |
          curl -f https://staging.drugdesigner.com/api/health
          curl -f https://staging.drugdesigner.com/
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Staging deployment successful!"
          echo "Environment: staging"
          echo "Commit: ${{ github.sha }}"
          echo "URL: https://staging.drugdesigner.com"
      
      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Staging deployment failed!"
          echo "Commit: ${{ github.sha }}"

  # ═══════════════════════════════════════════════════════════
  # Deploy to Production
  # ═══════════════════════════════════════════════════════════
  
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [determine-environment, build-and-push]
    if: needs.determine-environment.outputs.environment == 'production'
    environment:
      name: production
      url: https://drugdesigner.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts
      
      - name: Create backup
        run: |
          ssh ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/drugdesigner
            
            # Backup database
            docker-compose exec -T postgres pg_dump -U drugdesigner drugdesigner | gzip > backups/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz
            
            # Backup current deployment
            tar -czf backups/deployment-$(date +%Y%m%d-%H%M%S).tar.gz docker-compose.yml .env
          EOF
      
      - name: Deploy to production server
        run: |
          ssh ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/drugdesigner
            
            # Pull latest images
            docker-compose -f docker-compose.prod.yml pull
            
            # Run database migrations
            docker-compose -f docker-compose.prod.yml run --rm api alembic upgrade head
            
            # Deploy with zero downtime (rolling update)
            # Scale up new instances
            docker-compose -f docker-compose.prod.yml up -d --no-deps --scale api=4 --scale web=2 --no-recreate api web
            
            # Wait for new instances to be healthy
            sleep 60
            
            # Scale down old instances
            docker-compose -f docker-compose.prod.yml up -d --no-deps --scale api=2 --scale web=1 api web
            
            # Wait for stabilization
            sleep 30
            
            # Verify deployment
            curl -f http://localhost:8000/api/health || exit 1
            
            # Clean up old images
            docker image prune -f
          EOF
      
      - name: Run smoke tests
        run: |
          curl -f https://drugdesigner.com/api/health
          curl -f https://drugdesigner.com/
      
      - name: Run post-deployment validation
        run: |
          # Test critical endpoints
          curl -f https://drugdesigner.com/api/health/deep
          
          # Test authentication
          curl -f https://drugdesigner.com/api/auth/health
          
          # Test database connectivity
          curl -f https://drugdesigner.com/api/health/db
      
      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "✅ Production deployment successful!",
              attachments: [{
                color: 'good',
                fields: [{
                  title: 'Environment',
                  value: 'production',
                  short: true
                }, {
                  title: 'Commit',
                  value: '${{ github.sha }}',
                  short: true
                }, {
                  title: 'URL',
                  value: 'https://drugdesigner.com',
                  short: false
                }]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Rollback on failure
        if: failure()
        run: |
          ssh ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /opt/drugdesigner
            
            # Rollback to previous version
            docker-compose -f docker-compose.prod.yml down
            
            # Restore from backup
            LATEST_BACKUP=$(ls -t backups/deployment-*.tar.gz | head -1)
            tar -xzf $LATEST_BACKUP
            
            # Restart services
            docker-compose -f docker-compose.prod.yml up -d
          EOF
      
      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "❌ Production deployment failed and was rolled back!",
              attachments: [{
                color: 'danger',
                fields: [{
                  title: 'Environment',
                  value: 'production',
                  short: true
                }, {
                  title: 'Commit',
                  value: '${{ github.sha }}',
                  short: true
                }, {
                  title: 'Action',
                  value: 'Rolled back to previous version',
                  short: false
                }]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ═══════════════════════════════════════════════════════════
  # Post-Deployment Tasks
  # ═══════════════════════════════════════════════════════════
  
  post-deployment:
    name: Post-Deployment Tasks
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    
    steps:
      - name: Update deployment status
        run: |
          echo "Deployment completed"
          echo "Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "Commit: ${{ github.sha }}"
      
      - name: Tag release (production only)
        if: needs.deploy-production.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${new Date().toISOString().split('T')[0].replace(/-/g, '.')}-${context.sha.substring(0, 7)}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            console.log(`Created tag: ${tag}`);
      
      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ needs.determine-environment.outputs.environment }}',
              auto_merge: false,
              required_contexts: []
            });

  # ═══════════════════════════════════════════════════════════
  # Deployment Summary
  # ═══════════════════════════════════════════════════════════
  
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-staging, deploy-production, post-deployment]
    if: always()
    
    steps:
      - name: Generate deployment summary
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.determine-environment.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "✅ **Staging deployment:** Success" >> $GITHUB_STEP_SUMMARY
            echo "🔗 **URL:** https://staging.drugdesigner.com" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy-staging.result }}" == "failure" ]; then
            echo "❌ **Staging deployment:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "✅ **Production deployment:** Success" >> $GITHUB_STEP_SUMMARY
            echo "🔗 **URL:** https://drugdesigner.com" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy-production.result }}" == "failure" ]; then
            echo "❌ **Production deployment:** Failed (rolled back)" >> $GITHUB_STEP_SUMMARY
          fi
